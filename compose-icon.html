<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Trueform Icon Compose</title>
  <style>
    html, body { margin:0; padding:0; background:#0b5fff; width:1024px; height:1024px; overflow:hidden; }
    .icon {
      position: relative;
      width: 1024px;
      height: 1024px;
      background: #0b5fff;
    }
    .plate {
      position:absolute;
      left: 132px;
      top: 132px;
      width: 760px;
      height: 760px;
      background: rgba(4,23,54,0.22);
      border-radius: 120px;
    }
    img {
      position:absolute;
      left: 102px;
      top: 102px;
      width: 820px;
      height: 820px;
      object-fit: contain;
    }
  </style>
</head>
<body>
  <div class="icon">
    <div class="plate"></div>
    <img src="https://trueform-3d-production.up.railway.app/branding/logo-square.png?v=20260324-3" />
  </div>
</body>
</html>
